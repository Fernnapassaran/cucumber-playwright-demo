name: Cucumber API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Grant Execute Permissions
        run: chmod -R +x node_modules/.bin/

      - name: Start QA Practice API
        run: |
          docker run -d --rm \
            --name qa-practice-api \
            -p 8887:8080 \
            rvancea/qa-practice-api:latest

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8887/api/v1/employees || echo "000")
            echo "Attempt $i - HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API is ready!"
              exit 0
            fi
            sleep 5
          done
          echo "API failed to start!"
          docker logs qa-practice-api
          exit 1

      - name: Run Cucumber tests
        run: npx cucumber-js --config cucumber.backend.js
        env:
          NODE_OPTIONS: "--dns-result-order=ipv4first"

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: reports/report.html
          retention-days: 30

      - name: Stop Docker container
        if: always()
        run: docker stop qa-practice-api || true
