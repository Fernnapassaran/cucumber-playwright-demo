name: Cucumber API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Grant Execute Permissions
        run: chmod -R +x node_modules/.bin/

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start QA Practice API
        run: |
          docker run -d --rm \
            --name qa-practice-api \
            -p 8080:8080 \
            rvancea/qa-practice-api:latest

      - name: Wait for API to be ready
        run: |
          sleep 10
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8887/api/v1/employees || echo "000")
            echo "Attempt $i - HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API is ready!"
              break
            fi
            sleep 3
          done

      - name: Run Cucumber tests
        run: npm test # report.html ถูก generate อัตโนมัติ

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: reports/report.html
          retention-days: 30

      - name: Stop Docker container
        if: always()
        run: docker stop qa-practice-api || true
