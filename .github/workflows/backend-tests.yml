name: Backend API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-api-tests:
    name: Run Cucumber API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Grant Execute Permissions
        run: chmod -R +x node_modules/.bin/ || true

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start QA Practice API
        run: |
          docker run -d --rm \
            --name qa-practice-api \
            -p 8887:8080 \
            rvancea/qa-practice-api:latest

      - name: Wait for API to be ready
        run: |
          sleep 10
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8887/api/v1/employees || echo "000")
            echo "Attempt $i - HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API is ready!"
              break
            fi
            sleep 3
          done

      - name: Run Backend API Tests
        run: npx cucumber-js --config cucumber.backend.js
        env:
          # 🟢 ไม้ตายสุดท้าย: บังคับให้ Node 24 ค้นหา DNS เจอฝั่ง IPv4 (127.0.0.1) เป็นอันดับแรก ไม่หลงไป IPv6
          NODE_OPTIONS: "--dns-result-order=ipv4first"

      - name: Generate HTML Report
        if: always()
        run: node generate-report.js

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: reports/backend-report.html
          retention-days: 30

      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json-report
          path: reports/backend-report.json
          retention-days: 30

      - name: Stop Docker container
        if: always()
        run: docker stop qa-practice-api || true
